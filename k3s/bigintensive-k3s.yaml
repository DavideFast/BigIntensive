apiVersion: batch/v1
kind: Job
metadata:
  name: citus-bootstrap
  namespace: bigintensive
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: citusdata/citus:12.1
          envFrom:
            - secretRef:
                name: bigintensive-secrets
            - configMapRef:
                name: bigintensive-config
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: bigintensive-secrets
                  key: CITUS_POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bigintensive-secrets
                  key: CITUS_POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: bigintensive-config
                  key: CITUS_POSTGRES_DB
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: bigintensive-secrets
                  key: CITUS_POSTGRES_PASSWORD
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -eu
              until pg_isready -h citus-worker-1 -p 5432 -U "$POSTGRES_USER" >/dev/null 2>&1; do
                sleep 2
              done
              until pg_isready -h citus-worker-2 -p 5432 -U "$POSTGRES_USER" >/dev/null 2>&1; do
                sleep 2
              done
              until pg_isready -h citus-coordinator -p 5432 -U "$POSTGRES_USER" >/dev/null 2>&1; do
                sleep 2
              done
              psql -h citus-worker-1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" -f /bootstrap/init-worker.sql
              psql -h citus-worker-2 -U "$POSTGRES_USER" -d "$POSTGRES_DB" -f /bootstrap/init-worker.sql
              psql -h citus-coordinator -U "$POSTGRES_USER" -d "$POSTGRES_DB" -f /bootstrap/init-coordinator.sql
              psql -h citus-coordinator -U "$POSTGRES_USER" -d "$POSTGRES_DB" -f /bootstrap/init-tables.sql
          volumeMounts:
            - name: bootstrap-scripts
              mountPath: /bootstrap
      volumes:
        - name: bootstrap-scripts
          configMap:
            name: citus-bootstrap-scripts
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: bigintensive
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: kafka
  ports:
    - name: internal
      port: 19092
      targetPort: 19092
    - name: client
      port: 9092
      targetPort: 9092
    - name: controller
      port: 9093
      targetPort: 9093
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: bigintensive
spec:
  serviceName: kafka
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.7.0
          ports:
            - containerPort: 19092
            - containerPort: 9092
            - containerPort: 9093
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: broker,controller
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://:19092,PLAINTEXT_HOST://:9092,CONTROLLER://:9093
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://kafka:19092,PLAINTEXT_HOST://kafka:9092
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: 1@kafka:9093
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: PLAINTEXT
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
              value: "0"
          volumeMounts:
            - name: data
              mountPath: /bitnami/kafka
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-ui
  namespace: bigintensive
spec:
  type: ClusterIP
  selector:
    app: kafka-ui
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-ui
  namespace: bigintensive
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-ui
  template:
    metadata:
      labels:
        app: kafka-ui
    spec:
      containers:
        - name: kafka-ui
          image: provectuslabs/kafka-ui:v0.7.2
          ports:
            - containerPort: 8080
          env:
            - name: KAFKA_CLUSTERS_0_NAME
              value: bigintensive-local
            - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
              value: kafka:19092
---
apiVersion: v1
kind: Service
metadata:
  name: backend-api
  namespace: bigintensive
spec:
  type: ClusterIP
  selector:
    app: backend-api
  ports:
    - name: http
      port: 3001
      targetPort: 3001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
  namespace: bigintensive
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      labels:
        app: backend-api
    spec:
      containers:
        - name: backend-api
          image: bigintensive/backend-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          envFrom:
            - secretRef:
                name: bigintensive-secrets
            - configMapRef:
                name: bigintensive-config
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: bigintensive-config
                  key: BACKEND_PORT
            - name: CORS_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: bigintensive-config
                  key: CORS_ORIGIN
            - name: CITUS_HOST
              valueFrom:
                configMapKeyRef:
                  name: bigintensive-config
                  key: CITUS_HOST
            - name: CITUS_PORT
              valueFrom:
                configMapKeyRef:
                  name: bigintensive-config
                  key: CITUS_PORT
            - name: CITUS_POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: bigintensive-secrets
                  key: CITUS_POSTGRES_USER
            - name: CITUS_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bigintensive-secrets
                  key: CITUS_POSTGRES_PASSWORD
            - name: CITUS_POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: bigintensive-config
                  key: CITUS_POSTGRES_DB
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: bigintensive-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: PYTHON_BIN
              valueFrom:
                configMapKeyRef:
                  name: bigintensive-config
                  key: PYTHON_BIN
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
