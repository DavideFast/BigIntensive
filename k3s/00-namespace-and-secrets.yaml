apiVersion: v1
kind: Namespace
metadata:
  name: bigintensive
---
apiVersion: v1
kind: Secret
metadata:
  name: bigintensive-secrets
  namespace: bigintensive
type: Opaque
stringData:
  CITUS_POSTGRES_USER: postgres
  CITUS_POSTGRES_PASSWORD: postgres
  JUPYTER_TOKEN: changeme
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bigintensive-config
  namespace: bigintensive
data:
  CITUS_POSTGRES_DB: bigintensive
  BACKEND_PORT: "3001"
  FRONTEND_PORT: "5173"
  CITUS_HOST: citus-coordinator
  CITUS_PORT: "5432"
  KAFKA_BOOTSTRAP_SERVERS: kafka:19092
  PYTHON_BIN: python3
  CORS_ORIGIN: http://bigintensive.local,http://localhost:5173,http://127.0.0.1:5173
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: citus-bootstrap-scripts
  namespace: bigintensive
data:
  init-worker.sql: |
    CREATE EXTENSION IF NOT EXISTS citus;
    SELECT citus_set_coordinator_host('citus-coordinator', 5432);
  init-coordinator.sql: |
    CREATE EXTENSION IF NOT EXISTS citus;

    DO $$
    BEGIN
      IF NOT EXISTS (
        SELECT 1
        FROM pg_dist_node
        WHERE nodename = 'citus-worker-1' AND nodeport = 5432
      ) THEN
        PERFORM citus_add_node('citus-worker-1', 5432);
      END IF;

      IF NOT EXISTS (
        SELECT 1
        FROM pg_dist_node
        WHERE nodename = 'citus-worker-2' AND nodeport = 5432
      ) THEN
        PERFORM citus_add_node('citus-worker-2', 5432);
      END IF;
    END;
    $$;
  init-tables.sql: |
    CREATE TABLE IF NOT EXISTS athletes (
      athlete_id SERIAL PRIMARY KEY,
      nome VARCHAR(100) NOT NULL,
      cognome VARCHAR(100) NOT NULL,
      eta INT CHECK (eta > 0 AND eta < 150),
      sesso CHAR(1) CHECK (sesso IN ('M', 'F', 'O')),
      altezza_cm INT CHECK (altezza_cm > 50 AND altezza_cm < 300),
      peso_kg DECIMAL(5, 2) CHECK (peso_kg > 10 AND peso_kg < 500),
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    SELECT create_reference_table('athletes');

    CREATE TABLE IF NOT EXISTS exercise_metrics (
      metric_id BIGSERIAL,
      athlete_id INT NOT NULL REFERENCES athletes(athlete_id),
      esercizio VARCHAR(50) NOT NULL,
      valore_salto DECIMAL(10, 2) NOT NULL,
      rsi DECIMAL(10, 4) NOT NULL,
      differenza_bilaterale DECIMAL(10, 2) NOT NULL,
      potenza_sviluppata DECIMAL(12, 2) NOT NULL,
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      PRIMARY KEY (athlete_id, metric_id)
    );

    SELECT create_distributed_table('exercise_metrics', 'athlete_id');

    CREATE TABLE IF NOT EXISTS cardio_endurance_samples (
      sample_id BIGSERIAL,
      athlete_id INT NOT NULL REFERENCES athletes(athlete_id),
      heart_rate_bpm DECIMAL(5, 1) NOT NULL,
      cadence_spm DECIMAL(5, 1) NOT NULL,
      speed_kmh DECIMAL(5, 2) NOT NULL,
      altitude_m DECIMAL(7, 2) NOT NULL,
      timestamp TIMESTAMP NOT NULL,
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      PRIMARY KEY (athlete_id, sample_id)
    );

    SELECT create_distributed_table('cardio_endurance_samples', 'athlete_id');

    INSERT INTO athletes (nome, cognome, eta, sesso, altezza_cm, peso_kg)
    VALUES
      ('Marco', 'Rossi', 28, 'M', 182, 80.5),
      ('Giulia', 'Bianchi', 25, 'F', 168, 62.3),
      ('Alessandro', 'Verdi', 32, 'M', 175, 75.0)
    ON CONFLICT DO NOTHING;

    CREATE OR REPLACE VIEW athletes_latest AS
    SELECT
      athlete_id,
      nome,
      cognome,
      eta,
      sesso,
      altezza_cm,
      peso_kg,
      created_at,
      updated_at
    FROM athletes
    ORDER BY updated_at DESC;
