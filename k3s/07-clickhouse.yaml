# ClickHouse Distributed Database (2 shard, 1 replica per shard)
# Pragmatic setup for 2 nodes: 1 Keeper + 2 ClickHouse pods
# ClickHouse Keeper (nativo, moderno, sostituisce Zookeeper)
# Tables: workout_metrics, sensor_data

---
# ClickHouse Keeper ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-keeper-config
  namespace: bigintensive
data:
  config.xml: |
    <clickhouse>
      <logger>
        <level>information</level>
        <log>/var/log/clickhouse-keeper/clickhouse-keeper.log</log>
        <errorlog>/var/log/clickhouse-keeper/clickhouse-keeper.err.log</errorlog>
      </logger>
      <listen_host>0.0.0.0</listen_host>
      <keeper_server>
        <tcp_port>2181</tcp_port>
        <server_id>1</server_id>
        <snapshot_storage_path>/var/lib/clickhouse-keeper/snapshots</snapshot_storage_path>
        <log_storage_path>/var/lib/clickhouse-keeper/logs</log_storage_path>
        <coordination_settings>
          <operation_timeout_ms>10000</operation_timeout_ms>
          <session_timeout_ms>30000</session_timeout_ms>
          <election_timeout_lower_bound_ms>1000</election_timeout_lower_bound_ms>
          <election_timeout_upper_bound_ms>2000</election_timeout_upper_bound_ms>
        </coordination_settings>
        <raft_configuration>
          <server>
            <id>1</id>
            <hostname>clickhouse-keeper-0.clickhouse-keeper.bigintensive.svc.cluster.local</hostname>
            <port>9444</port>
          </server>
        </raft_configuration>
      </keeper_server>
    </clickhouse>

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse-keeper
  namespace: bigintensive
spec:
  serviceName: clickhouse-keeper
  replicas: 1
  selector:
    matchLabels:
      app: clickhouse-keeper
  template:
    metadata:
      labels:
        app: clickhouse-keeper
    spec:
      containers:
        - name: clickhouse-keeper
          image: clickhouse/clickhouse-keeper:24.1
          command:
            - clickhouse-keeper
            - --config
            - /etc/clickhouse-keeper/config.xml
          ports:
            - containerPort: 2181
              name: client
            - containerPort: 9444
              name: raft
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse-keeper
            - name: config
              mountPath: /etc/clickhouse-keeper/config.xml
              subPath: config.xml
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            tcpSocket:
              port: 2181
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 2181
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: clickhouse-keeper-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse-keeper
  namespace: bigintensive
spec:
  clusterIP: None
  selector:
    app: clickhouse-keeper
  ports:
    - port: 2181
      name: client
    - port: 9444
      name: raft

---
# ClickHouse ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-config
  namespace: bigintensive
data:
  bigintensive.xml: |
    <clickhouse>
      <listen_host>0.0.0.0</listen_host>
      <timezone>UTC</timezone>
      <remote_servers>
        <bigintensive_cluster>
          <shard>
            <replica>
              <host>clickhouse-0.clickhouse.bigintensive.svc.cluster.local</host>
              <port>9000</port>
            </replica>
          </shard>
          <shard>
            <replica>
              <host>clickhouse-1.clickhouse.bigintensive.svc.cluster.local</host>
              <port>9000</port>
            </replica>
          </shard>
        </bigintensive_cluster>
      </remote_servers>
      <zookeeper>
        <node index="1">
          <host>clickhouse-keeper-0.clickhouse-keeper.bigintensive.svc.cluster.local</host>
          <port>2181</port>
        </node>
      </zookeeper>
      <default_replica_path>/clickhouse/tables/{shard}/{database}/{table}</default_replica_path>
      <default_replica_name>{replica}</default_replica_name>
    </clickhouse>

  bigintensive-users.xml: |
    <?xml version="1.0"?>
    <clickhouse>
      <profiles>
        <default>
          <max_memory_usage>10000000000</max_memory_usage>
          <use_uncompressed_cache>0</use_uncompressed_cache>
          <load_balancing>random</load_balancing>
        </default>
        <readonly>
          <readonly>1</readonly>
        </readonly>
      </profiles>

      <quotas>
        <default>
          <interval>
            <duration>3600</duration>
            <queries>0</queries>
            <errors>0</errors>
            <result_rows>0</result_rows>
            <read_rows>0</read_rows>
            <execution_time>0</execution_time>
          </interval>
        </default>
      </quotas>

      <users>
        <default>
          <password></password>
          <networks>
            <ip>127.0.0.1</ip>
            <ip>::1</ip>
            <ip>0.0.0.0/0</ip>
          </networks>
          <profile>default</profile>
          <quota>default</quota>
        </default>
        <readonly>
          <password></password>
          <networks>
            <ip>::1</ip>
            <ip>127.0.0.1</ip>
          </networks>
          <profile>readonly</profile>
          <quota>default</quota>
        </readonly>
      </users>
    </clickhouse>

---
# ClickHouse StatefulSet (2 replica)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
  namespace: bigintensive
spec:
  serviceName: clickhouse
  replicas: 2
  selector:
    matchLabels:
      app: clickhouse
  template:
    metadata:
      labels:
        app: clickhouse
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24.1
          command:
            - /bin/sh
            - -c
            - |
              ordinal="${POD_NAME##*-}"
              shard="$((ordinal + 1))"
              replica="replica_${shard}"
              cat > /etc/clickhouse-server/config.d/macros.xml <<EOF
              <clickhouse>
                <macros>
                  <shard>${shard}</shard>
                  <replica>${replica}</replica>
                </macros>
              </clickhouse>
              EOF
              exec clickhouse-server --config-file=/etc/clickhouse-server/config.xml
          ports:
            - containerPort: 8123
              name: http
            - containerPort: 9000
              name: native
            - containerPort: 9009
              name: interserver
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: CLICKHOUSE_DB
              value: bigintensive
            - name: CLICKHOUSE_USER
              value: default
            - name: CLICKHOUSE_PASSWORD
              value: ""
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: logs
              mountPath: /var/log/clickhouse-server
            - name: config
              mountPath: /etc/clickhouse-server/config.d/bigintensive.xml
              subPath: bigintensive.xml
            - name: config
              mountPath: /etc/clickhouse-server/users.d/bigintensive-users.xml
              subPath: bigintensive-users.xml
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: clickhouse-config
        - name: logs
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 10Gi

---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: bigintensive
spec:
  clusterIP: None
  selector:
    app: clickhouse
  ports:
    - port: 8123
      name: http
    - port: 9000
      name: native
    - port: 9009
      name: interserver

---
# ClickHouse Client Service (per accesso esterno)
apiVersion: v1
kind: Service
metadata:
  name: clickhouse-client
  namespace: bigintensive
spec:
  type: ClusterIP
  selector:
    app: clickhouse
  ports:
    - port: 8123
      targetPort: 8123
      name: http
    - port: 9000
      targetPort: 9000
      name: native

---
# ClickHouse Init Job (crea tabelle)
apiVersion: batch/v1
kind: Job
metadata:
  name: clickhouse-init
  namespace: bigintensive
spec:
  template:
    spec:
      serviceAccountName: default
      restartPolicy: Never
      containers:
        - name: clickhouse-init
          image: clickhouse/clickhouse-server:24.1
          command:
            - /bin/sh
            - -c
            - |
              # Wait for ClickHouse to be ready
              for i in {1..30}; do
                clickhouse-client --host clickhouse-0.clickhouse.bigintensive.svc.cluster.local --port 9000 --query "SELECT 1" 2>/dev/null && break
                echo "Waiting for ClickHouse... ($i/30)"
                sleep 2
              done

              # Create database
              clickhouse-client --host clickhouse-0.clickhouse.bigintensive.svc.cluster.local --port 9000 --query "CREATE DATABASE IF NOT EXISTS bigintensive"

              # Create workout_metrics table (replicated)
              clickhouse-client --host clickhouse-0.clickhouse.bigintensive.svc.cluster.local --port 9000 --query "
                CREATE TABLE IF NOT EXISTS bigintensive.workout_metrics ON CLUSTER bigintensive_cluster (
                  athlete_id UInt32,
                  workout_id UInt32,
                  timestamp DateTime,
                  power Float32,
                  heart_rate UInt16,
                  cadence UInt16,
                  speed Float32,
                  distance Float32
                ) ENGINE = ReplicatedMergeTree('/clickhouse/tables/{shard}/{database}/{table}', '{replica}')
                ORDER BY (timestamp, athlete_id)
                PARTITION BY toYYYYMM(timestamp)
                TTL timestamp + INTERVAL 1 YEAR DELETE
              "

              # Create sensor_data table (replicated)
              clickhouse-client --host clickhouse-0.clickhouse.bigintensive.svc.cluster.local --port 9000 --query "
                CREATE TABLE IF NOT EXISTS bigintensive.sensor_data ON CLUSTER bigintensive_cluster (
                  sensor_id UInt32,
                  timestamp DateTime,
                  value Float32,
                  sensor_type String
                ) ENGINE = ReplicatedMergeTree('/clickhouse/tables/{shard}/{database}/{table}', '{replica}')
                ORDER BY (timestamp, sensor_id)
                PARTITION BY toYYYYMM(timestamp)
                TTL timestamp + INTERVAL 1 YEAR DELETE
              "

              echo "ClickHouse initialization completed!"
          env:
            - name: CLICKHOUSE_HOST
              value: clickhouse-0.clickhouse.bigintensive.svc.cluster.local
