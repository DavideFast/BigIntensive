apiVersion: v1
kind: Service
metadata:
  name: citus-coordinator
  namespace: bigintensive
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: citus-coordinator
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: citus-coordinator
  namespace: bigintensive
spec:
  serviceName: citus-coordinator
  replicas: 1
  selector:
    matchLabels:
      app: citus-coordinator
  template:
    metadata:
      labels:
        app: citus-coordinator
    spec:
      containers:
        - name: postgres
          image: citusdata/citus:12.1
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: bigintensive-secrets
            - configMapRef:
                name: bigintensive-config
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: bigintensive-secrets
                  key: CITUS_POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bigintensive-secrets
                  key: CITUS_POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: bigintensive-config
                  key: CITUS_POSTGRES_DB
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: bigintensive-secrets
                  key: CITUS_POSTGRES_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
