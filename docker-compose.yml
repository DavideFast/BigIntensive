name: bigintensive-spark

services:
  spark-master:
    image: apache/spark:3.5.0
    container_name: spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - ./spark/apps:/opt/spark-apps
      - ./spark/data:/opt/spark-data
    networks:
      - spark-net

  spark-worker-1:
    image: apache/spark:3.5.0
    container_name: spark-worker-1
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=${SPARK_WORKER_MEMORY:-2G}
      - SPARK_WORKER_CORES=${SPARK_WORKER_CORES:-2}
      - SPARK_WORKER_WEBUI_PORT=8081
    ports:
      - "8081:8081"
    volumes:
      - ./spark/apps:/opt/spark-apps
      - ./spark/data:/opt/spark-data
    networks:
      - spark-net

  spark-worker-2:
    image: apache/spark:3.5.0
    container_name: spark-worker-2
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=${SPARK_WORKER_MEMORY:-2G}
      - SPARK_WORKER_CORES=${SPARK_WORKER_CORES:-2}
      - SPARK_WORKER_WEBUI_PORT=8082
    ports:
      - "8082:8082"
    volumes:
      - ./spark/apps:/opt/spark-apps
      - ./spark/data:/opt/spark-data
    networks:
      - spark-net

  jupyter:
    image: jupyter/pyspark-notebook:spark-3.5.0
    container_name: spark-jupyter
    depends_on:
      - spark-master
      - spark-worker-1
      - spark-worker-2
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - PYSPARK_SUBMIT_ARGS=--master spark://spark-master:7077 pyspark-shell
      - JUPYTER_TOKEN=${JUPYTER_TOKEN:-changeme}
    command: start-notebook.py --ServerApp.token=${JUPYTER_TOKEN:-changeme}
    ports:
      - "${JUPYTER_PORT:-8888}:8888"
    volumes:
      - ./spark:/home/jovyan/work
    networks:
      - spark-net

  citus-coordinator:
    image: citusdata/citus:12.1
    container_name: citus-coordinator
    environment:
      - POSTGRES_USER=${CITUS_POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${CITUS_POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${CITUS_POSTGRES_DB:-bigintensive}
    ports:
      - "${CITUS_COORDINATOR_PORT:-5432}:5432"
    volumes:
      - ./postgres/coordinator-data:/var/lib/postgresql/data
      - ./scripts/citus:/citus-init
    networks:
      - spark-net

  citus-worker-1:
    image: citusdata/citus:12.1
    container_name: citus-worker-1
    environment:
      - POSTGRES_USER=${CITUS_POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${CITUS_POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${CITUS_POSTGRES_DB:-bigintensive}
    ports:
      - "${CITUS_WORKER1_PORT:-5433}:5432"
    volumes:
      - ./postgres/worker1-data:/var/lib/postgresql/data
      - ./scripts/citus:/citus-init
    networks:
      - spark-net

  citus-worker-2:
    image: citusdata/citus:12.1
    container_name: citus-worker-2
    environment:
      - POSTGRES_USER=${CITUS_POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${CITUS_POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${CITUS_POSTGRES_DB:-bigintensive}
    ports:
      - "${CITUS_WORKER2_PORT:-5434}:5432"
    volumes:
      - ./postgres/worker2-data:/var/lib/postgresql/data
      - ./scripts/citus:/citus-init
    networks:
      - spark-net

  kafka:
    image: bitnami/kafka:3.7
    container_name: kafka
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:${KAFKA_EXTERNAL_PORT:-9094}
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - ALLOW_PLAINTEXT_LISTENER=yes
    ports:
      - "${KAFKA_EXTERNAL_PORT:-9094}:9094"
    volumes:
      - ./kafka/data:/bitnami/kafka
    networks:
      - spark-net

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    depends_on:
      - kafka
    environment:
      - KAFKA_CLUSTERS_0_NAME=bigintensive-local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    ports:
      - "${KAFKA_UI_PORT:-8088}:8080"
    networks:
      - spark-net

networks:
  spark-net:
    driver: bridge
