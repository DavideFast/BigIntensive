name: bigintensive-spark

services:
  spark-master:
    image: apache/spark:3.5.0
    container_name: spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - ./spark/apps:/opt/spark-apps
      - ./spark/data:/opt/spark-data
    networks:
      - spark-net

  spark-worker-1:
    image: apache/spark:3.5.0
    container_name: spark-worker-1
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=${SPARK_WORKER_MEMORY:-2G}
      - SPARK_WORKER_CORES=${SPARK_WORKER_CORES:-2}
      - SPARK_WORKER_WEBUI_PORT=8081
    ports:
      - "8081:8081"
    volumes:
      - ./spark/apps:/opt/spark-apps
      - ./spark/data:/opt/spark-data
    networks:
      - spark-net

  spark-worker-2:
    image: apache/spark:3.5.0
    container_name: spark-worker-2
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=${SPARK_WORKER_MEMORY:-2G}
      - SPARK_WORKER_CORES=${SPARK_WORKER_CORES:-2}
      - SPARK_WORKER_WEBUI_PORT=8082
    ports:
      - "8082:8082"
    volumes:
      - ./spark/apps:/opt/spark-apps
      - ./spark/data:/opt/spark-data
    networks:
      - spark-net

  jupyter:
    image: jupyter/pyspark-notebook:spark-3.5.0
    container_name: spark-jupyter
    depends_on:
      - spark-master
      - spark-worker-1
      - spark-worker-2
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - PYSPARK_SUBMIT_ARGS=--master spark://spark-master:7077 pyspark-shell
      - JUPYTER_TOKEN=${JUPYTER_TOKEN:-changeme}
    command: start-notebook.py --ServerApp.token=${JUPYTER_TOKEN:-changeme}
    ports:
      - "${JUPYTER_PORT:-8888}:8888"
    volumes:
      - ./spark:/home/jovyan/work
    networks:
      - spark-net

  citus-coordinator:
    image: citusdata/citus:12.1
    container_name: citus-coordinator
    environment:
      - POSTGRES_USER=${CITUS_POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${CITUS_POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${CITUS_POSTGRES_DB:-bigintensive}
      - PGPASSWORD=${CITUS_POSTGRES_PASSWORD:-postgres}
    ports:
      - "${CITUS_COORDINATOR_PORT:-55432}:5432"
    volumes:
      - ./postgres/coordinator-data:/var/lib/postgresql/data
      - ./scripts/citus:/citus-init
    networks:
      - spark-net

  citus-worker-1:
    image: citusdata/citus:12.1
    container_name: citus-worker-1
    environment:
      - POSTGRES_USER=${CITUS_POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${CITUS_POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${CITUS_POSTGRES_DB:-bigintensive}
      - PGPASSWORD=${CITUS_POSTGRES_PASSWORD:-postgres}
    ports:
      - "${CITUS_WORKER1_PORT:-5433}:5432"
    volumes:
      - ./postgres/worker1-data:/var/lib/postgresql/data
      - ./scripts/citus:/citus-init
    networks:
      - spark-net

  citus-worker-2:
    image: citusdata/citus:12.1
    container_name: citus-worker-2
    environment:
      - POSTGRES_USER=${CITUS_POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${CITUS_POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${CITUS_POSTGRES_DB:-bigintensive}
      - PGPASSWORD=${CITUS_POSTGRES_PASSWORD:-postgres}
    ports:
      - "${CITUS_WORKER2_PORT:-5434}:5432"
    volumes:
      - ./postgres/worker2-data:/var/lib/postgresql/data
      - ./scripts/citus:/citus-init
    networks:
      - spark-net

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:19092,PLAINTEXT_HOST://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:${KAFKA_EXTERNAL_PORT:-9094}
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    ports:
      - "${KAFKA_EXTERNAL_PORT:-9094}:9092"
    volumes:
      - ./kafka/data:/bitnami/kafka
    networks:
      - spark-net

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    depends_on:
      - kafka
    environment:
      - KAFKA_CLUSTERS_0_NAME=bigintensive-local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:19092
    ports:
      - "${KAFKA_UI_PORT:-8088}:8080"
    networks:
      - spark-net

  backend-api:
    build:
      context: .
      dockerfile: backend-api/Dockerfile
    container_name: backend-api
    depends_on:
      - citus-coordinator
      - citus-worker-1
      - citus-worker-2
      - kafka
    environment:
      - PORT=3001
      - CORS_ORIGIN=http://localhost:${FRONTEND_PORT:-5173}
      - CITUS_POSTGRES_USER=${CITUS_POSTGRES_USER:-postgres}
      - CITUS_POSTGRES_PASSWORD=${CITUS_POSTGRES_PASSWORD:-postgres}
      - CITUS_POSTGRES_DB=${CITUS_POSTGRES_DB:-bigintensive}
      - CITUS_HOST=citus-coordinator
      - CITUS_PORT=5432
      - KAFKA_BOOTSTRAP_SERVERS=kafka:19092
      - PYTHON_BIN=python3
      - K6_DOCKER_NETWORK=bigintensive-spark_spark-net
      - K6_DOCKER_VOLUME=bigintensive-spark_k6-shared
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - k6-shared:/k6-shared
    networks:
      - spark-net

  frontend-dashboard:
    build:
      context: .
      dockerfile: frontend-dashboard/Dockerfile
    container_name: frontend-dashboard
    depends_on:
      - backend-api
    environment:
      - VITE_API_BASE_URL=http://localhost:${BACKEND_PORT:-3001}
      - VITE_EVENTS_PATH=/events
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    networks:
      - spark-net

  k6:
    image: grafana/k6:0.53.0
    container_name: bigintensive-k6
    profiles:
      - loadtest
    depends_on:
      - backend-api
    working_dir: /scripts/load
    volumes:
      - ./scripts/load:/scripts/load
    networks:
      - spark-net
    entrypoint: ["k6"]

networks:
  spark-net:
    driver: bridge

volumes:
  k6-shared:
